<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <title>"Weble Scan"</title>
</head>

{{template "header" .}}

<body>

    <div class="w3-container" style="margin-left: 50px">
        <table id='scanresults' class="w3-table-all">
            <tr>
                <th>Address</th>
                <th>Connectable</th>
                <th>RSSI</th>
                <th>Name</th>
                <th>Company</th>
            </tr>
            {{range .Rows}}
                <tr class="item">
                    <td>{{.Addr}}</td>
                    <td>{{.Connectable}}</td>
                    <td>{{.RSSI}}</td>
                    <td>{{.LocalName}}</td>
                    <td>{{.Company}}</td>
                </tr>
            {{end}}
        </table>
    </div>
</body>
